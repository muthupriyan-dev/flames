<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #fff5f8 0%, #ffeef3 100%);
    display: flex;
    justify-content: center;
    padding: 24px 16px 60px;

  .app {

    max-width: 420px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .heart-icon {
    font-size: 48px;
    display: inline-block;
    animation: floatHeart 2.6s ease-in-out infinite;
  }

  @keyframes floatHeart {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(-4deg); }
  }

  .title {
    color: #ff5c8a;
    font-weight: 800;
    font-size: 28px;
    margin: 6px 0 0;
    letter-spacing: 0.5px;
  }

  label {
    display: block;
    color: #ff5c8a;
    font-weight: 700;
    font-size: 15px;
    margin: 18px 0 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #ffb3c9;
    border-radius: 14px;
    font-size: 16px;
    outline: none;
    background: #fff;
    color: #444;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: #ff5c8a;
    box-shadow: 0 0 0 4px rgba(255, 92, 138, 0.12);
  }

  .calc-btn {
    display: block;
    margin: 26px auto 0;
    padding: 12px 36px;
    background: #fff;
    border: 2px solid #ff5c8a;
    color: #ff5c8a;
    font-weight: 800;
    font-size: 16px;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.12s, background 0.2s, color 0.2s;
  }

  .calc-btn:active {
    transform: scale(0.96);
  }

  .calc-btn:hover {
    background: #ff5c8a;
    color: #fff;
  }

  .result-label {
    text-align: center;
    color: #ff5c8a;
    font-weight: 800;
    font-size: 24px;
    margin: 30px 0 14px;
  }

  .result-card {
    border: 2px solid #ffb3c9;
    border-radius: 18px;
    padding: 28px 20px;
    text-align: center;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #fff;
    transition: border-color 0.3s;
  }

  .result-emoji {
    font-size: 64px;
    margin-bottom: 10px;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-word {
    font-size: 28px;
    font-weight: 800;
    color: #ff5c8a;
  }

  .result-sub {
    font-size: 13px;
    color: #999;
    margin-top: 6px;
  }

  .placeholder {
    color: #ccc;
    font-size: 15px;
  }

  .elimination {
    margin-top: 16px;
    font-size: 12px;
    color: #aaa;
    word-break: break-word;
    line-height: 1.5;
  }

  .error {
    color: #ff5c8a;
    font-size: 13px;
    text-align: center;
    margin-top: 6px;
    min-height: 16px;
  }

  .footer {
    margin-top: 36px;
    text-align: center;
  }

  .footer-made-by {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 10px;
  }

  .footer-links {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .footer-links a {
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #ff5c8a;
    text-decoration: none;
    border: 1.5px solid #ffd1de;
    border-radius: 50%;
    background: #fff;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }

  .footer-links a:active {
    transform: scale(0.92);
  }

  .footer-links a:hover {
    background: #ff5c8a;
    color: #fff;
    border-color: #ff5c8a;
  }
</style>

<script>
  const FLAMES = [
    { letter: 'F', word: 'Friends', emoji: '🤝' },
    { letter: 'L', word: 'Love', emoji: '❤️' },
    { letter: 'A', word: 'Affection', emoji: '🥰' },
    { letter: 'M', word: 'Marriage', emoji: '💍' },
    { letter: 'E', word: 'Enemy', emoji: '😈' },
    { letter: 'S', word: 'Siblings', emoji: '👫' }
  ];

  const name1Input = document.getElementById('name1');
  const name2Input = document.getElementById('name2');
  const errorEl = document.getElementById('error');
  const resultCard = document.getElementById('resultCard');
  const calcBtn = document.getElementById('calcBtn');

  function clean(str) {
    return str.toLowerCase().replace(/[^a-z]/g, '');
  }

  function computeFlames(n1, n2) {
    let a = clean(n1).split('');
    let b = clean(n2).split('');

    // Cancel one occurrence of each common letter
    for (let i = 0; i < a.length; i++) {
      const idx = b.indexOf(a[i]);
      if (idx !== -1) {
        a.splice(i, 1);
        b.splice(idx, 1);
        i--;
      }
    }

    const count = a.length + b.length;
    if (count === 0) return null;

    // Circular elimination, like the classic FLAMES game
    let letters = FLAMES.map(f => f.letter);
    let pos = 0;
    while (letters.length > 1) {
      pos = (pos + count - 1) % letters.length;
      letters.splice(pos, 1);
      if (pos >= letters.length) pos = 0;
    }

    return FLAMES.find(f => f.letter === letters[0]);
  }

  function showPlaceholder(msg) {
    resultCard.innerHTML = `<span class="placeholder">${msg}</span>`;
  }

  function showResult(res) {
    resultCard.innerHTML = `
      <div class="result-emoji">${res.emoji}</div>
      <div class="result-word">${res.word}</div>
      <div class="result-sub">${res.letter} from F · L · A · M · E · S</div>
    `;
  }

  calcBtn.addEventListener('click', () => {
    errorEl.textContent = '';
    const n1 = name1Input.value.trim();
    const n2 = name2Input.value.trim();

    if (!n1 || !n2) {
      errorEl.textContent = 'Enter both names to calculate';
      showPlaceholder('Fill both names and tap Calculate');
      return;
    }

    const res = computeFlames(n1, n2);
    if (!res) {
      errorEl.textContent = 'Names cancel out completely — try different names';
      showPlaceholder('No result this time');
      return;
    }

    showResult(res);
  });

  [name1Input, name2Input].forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') calcBtn.click();
    });
  });
</script>
